apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservicio-auth
  namespace: genosentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microservicio-auth
  template:
    metadata:
      labels:
        app: microservicio-auth
    spec:
      containers:
        - name: microservicio-auth
          # Ajusta esta imagen al nombre que construyas y publiques en tu registry
          image: genosentinel/microservicio-auth:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CLINICA_BASE_URL
              value: "http://microservicio-clinica:3001"
            - name: GENOMICA_BASE_URL
              value: "http://microservicio-genomica:8000"
            - name: JWT_SECRET
              value: "CAMBIA_ESTA_CLAVE_EN_PRODUCCION_1234567890"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /gateway/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /gateway/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
