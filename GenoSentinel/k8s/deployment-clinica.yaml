apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservicio-clinica
  namespace: genosentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microservicio-clinica
  template:
    metadata:
      labels:
        app: microservicio-clinica
    spec:
      containers:
        - name: microservicio-clinica
          # Ajusta esta imagen al nombre que construyas y publiques en tu registry
          image: genosentinel/microservicio-clinica:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: clinica-config
            - secretRef:
                name: clinica-secrets
          ports:
            - containerPort: 3001
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
